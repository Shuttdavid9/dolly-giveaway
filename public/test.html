<!DOCTYPE html>
<html>
<head>
    <title>Test Image Upload</title>
</head>
<body>
    <h1>Test Image Upload to Google Sheets</h1>
    
    <input type="text" id="name" placeholder="Your Name">
    <input type="file" id="selfie" accept="image/*">
    <button onclick="upload()">Upload</button>
    
    <div id="result"></div>
    
    <script>
    async function fileToBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result.split(',')[1]);
            reader.onerror = reject;
            reader.readAsDataURL(file);
        });
    }
    
    async function upload() {
        const file = document.getElementById('selfie').files[0];
        if(!file) {
            alert("Select a file");
            return;
        }
        
        const name = document.getElementById('name').value;
        const base64 = await fileToBase64(file);
        
        const payload = {
            formData: JSON.stringify({
                trackingNumber: "TEST-" + Date.now(),
                fullName: name,
                email: "test@test.com"
            }),
            selfie: base64
        };
        
        document.getElementById('result').innerHTML = "Uploading...";
        
        try {
            const response = await fetch('https://script.google.com/macros/s/AKfycbwFKieQv4He0NJ4ljzDIu9nnB6ZH0GrShwdxZq9o_g9nlGrZ5SqtWNkVIjQhY6ZFTis/exec', {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            
            document.getElementById('result').innerHTML = "✅ Sent! Check Google Drive for image.";
        } catch(e) {
            document.getElementById('result').innerHTML = "Error: " + e.message;
        }
    }
    </script>
</body>
</html>
